    <script>
    function hexToRgb(hex) {
      if (!hex) return null;
      hex = hex.replace('#', '');
      let r = parseInt(hex.slice(0, 2), 16);
      let g = parseInt(hex.slice(2, 4), 16);
      let b = parseInt(hex.slice(4, 6), 16);
      return { r, g, b };
    }
    function adjustColor(color, adjustment) {
        if (!color) return null;
      let { r, g, b } = hexToRgb(color);
      r = Math.min(255, Math.max(0, r + adjustment));
      g = Math.min(255, Math.max(0, g + adjustment));
      b = Math.min(255, Math.max(0, b + adjustment));
      return `rgb(${r}, ${g}, ${b})`;
    }
    const BackColors = ['#FFFFFF', '#F0FFF0', '#FFFFF0'];
    let ColorIndex = 0;
    function changeBackgroundColor(newColor) {
        $('.outer, .widget-wrap h3, body, .article-inner, .article-inner .article-meta').css('background-color', newColor);
        $('.article-entry blockquote').css('background-color', adjustColor(newColor, -10)).css('border-left','4px solid #c8c8c8');
    }
    $(document).ready(function() {
        changeBackgroundColor(BackColors[ColorIndex]);
    });
    </script>

<script>
    // anchorInterceptor
    anchorInterceptor = function(path) {
        // 添加 fullpage=1 参数表示整页打开
        const separator = path.includes('?') ? '&' : '?';
        const fullPath = path + separator + 'fullpage=1';
        // change hash to trigger route change
        window.location.hash = fullPath;
    }

    document.addEventListener('DOMContentLoaded', function() {
        var container = document.getElementById('container');
        
        // 检查URL中是否有 fullpage=1 参数
        var urlParams = new URLSearchParams(window.location.search);
        var isFullPage = urlParams.get('fullpage') === '1';
        
        // 如果有 container（完整布局）或者 fullpage=1，执行跳转
        if (container || isFullPage) {
            var path = window.location.pathname;
            var origin = window.location.origin;
            console.log('path:',path, '\norigin:',origin);
            console.log('document:', document);
            // 如果已经在 hash 路由中，不需要跳转
            if (window.location.hash) {
                return;
            }
            // 如果path是根路径，跳转到首页hash
            if (path === '/' || path === '' || path === '/index.html') {
                window.location.href = origin + '#/';
            } else {
                window.location.href = origin + '#' + path;
            }
        }
        // 否则不跳转，需要加载js、css来渲染单页面
    });

    // 切换到单页模式
    switchToSinglePage = function() {
        // 获取当前文章路径（从hash中提取或从pathname）
        var path = window.location.hash ? window.location.hash.slice(1) : window.location.pathname;
        // 移除fullpage参数
        path = path.replace(/[?&]fullpage=1/, '');
        // 在新标签页打开完整URL
        window.open(window.location.origin + path, '_blank');
    }
